<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

    <title>Etch-a-Sketch</title>
</head>

<body>

    <h1 id="Title">Etch-a-Sketch</h1>

    <div class="layout">

        <div class="sidebar">

            <!-- COLOR PICKER -->
            <input type="color" id="color-picker" value="#3C6952">
            <div class="color-swatch" id="color-swatch"></div>

            <!-- CONTROL PANEL -->
            <div class="controls">
                <button id="draw-btn" class="active">Draw</button>
                <button id="eraser-btn">Eraser</button>
                <button id="clear-btn">Clear</button>

</div>

            <!-- CANVAS SIZE PANEL -->
            <div class="controls">

                <h2>Canvas Size</h2>

                <input type="range" id="grid-size" min="1" max="64" value="16">
                <span id="grid-value">16</span>

            </div>

        </div>

        <div class="easel">
            <div id="container"></div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
