<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Etch-a-Sketch</title>
</head>
<body>

<div class="layout">

    <!-- Controls -->
    <div class="controls">

        <input type="color" id="color-picker" value="#3C6952">

        <div class="color-swatch" id="color-swatch"></div>

        <input type="range" id="grid-size" min="1" max="64" value="16">
        <span id="grid-value">16</span>

    </div>

    <!-- Canvas / Staffelei -->
    <div class="easel">
        <div class="easel-top"></div>
        <div id="container"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
